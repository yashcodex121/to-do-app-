<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>✨ Planner Pro</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#1a1a2e" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #6c5ce7;
            --primary-dark: #5a4bd1;
            --primary-light: #a29bfe;
            --secondary: #00cec9;
            --accent: #fd79a8;
            --bg: #0f0f1f;
            --surface: rgba(255, 255, 255, 0.06);
            --surface2: rgba(255, 255, 255, 0.09);
            --surface3: rgba(255, 255, 255, 0.14);
            --text: #ffffff;
            --text2: rgba(255, 255, 255, 0.7);
            --text3: rgba(255, 255, 255, 0.4);
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 16px;
            --radius-sm: 12px;
            --transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        [data-theme="light"] {
            --bg: #f0f2f5;
            --surface: rgba(255, 255, 255, 0.8);
            --surface2: rgba(255, 255, 255, 0.9);
            --surface3: rgba(0, 0, 0, 0.05);
            --text: #1a1a2e;
            --text2: rgba(0, 0, 0, 0.6);
            --text3: rgba(0, 0, 0, 0.3);
            --border: rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            padding: 0;
            margin: 0;
        }

        .app-container {
            max-width: 430px;
            margin: 0 auto;
            padding: 0 16px 80px 16px;
            position: relative;
            z-index: 1;
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* ========== LOGIN ========== */
        #loginScreen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        #loginScreen.hidden {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }

        .login-box {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px 24px;
            width: 100%;
            max-width: 380px;
            box-shadow: var(--shadow);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .login-box::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--accent), var(--primary));
            background-size: 400% 400%;
            border-radius: var(--radius);
            z-index: -1;
            animation: gradientMove 6s ease infinite;
            opacity: 0.2;
        }
        @keyframes gradientMove {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .login-box .logo-icon {
            font-size: 2.8rem;
            margin-bottom: 4px;
            display: block;
        }
        .login-box h1 {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .login-box .sub {
            color: var(--text2);
            margin-bottom: 20px;
            font-size: 0.85rem;
        }

        .auth-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .auth-tabs button {
            flex: 1;
            padding: 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text2);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .auth-tabs button.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            border-color: var(--primary);
        }
        .auth-tabs button:active {
            transform: scale(0.95);
        }

        .auth-form {
            display: none;
            animation: fadeUp 0.3s ease;
        }
        .auth-form.active {
            display: block;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-box input {
            width: 100%;
            padding: 13px 16px;
            margin-bottom: 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
        }
        .login-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.15);
        }
        .login-box input::placeholder {
            color: var(--text3);
        }

        .login-box .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            margin-top: 4px;
        }
        .login-box .login-btn:active {
            transform: scale(0.97);
        }

        .auth-msg {
            font-size: 0.8rem;
            margin-top: 6px;
            display: none;
        }
        .auth-msg.error {
            color: #f87171;
            display: block;
        }
        .auth-msg.success {
            color: #4ade80;
            display: block;
        }

        .login-box .footer-text {
            margin-top: 14px;
            font-size: 0.7rem;
            color: var(--text3);
        }

        /* ========== HEADER ========== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            margin: 8px 0 16px 0;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-left h1 {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-left .user-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--surface2);
            padding: 3px 10px 3px 4px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: var(--text2);
            border: 1px solid var(--border);
        }
        .header-left .user-badge .name {
            max-width: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .header-stats {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: nowrap;
        }
        .stat-pill {
            background: var(--surface2);
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.7rem;
            border: 1px solid var(--border);
            white-space: nowrap;
        }
        .stat-pill span {
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-pill.green span {
            background: linear-gradient(135deg, #4ade80, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .logout-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.65rem;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }
        .header .logout-btn:active {
            transform: scale(0.9);
        }
        .header .theme-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: var(--transition);
        }

        /* ========== BOTTOM NAV ========== */
        .nav-tabs {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            gap: 2px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 6px 8px;
            padding-bottom: calc(6px + var(--safe-bottom));
            z-index: 100;
            box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.3);
            max-width: 430px;
            margin: 0 auto;
        }
        .nav-tabs button {
            flex: 1;
            padding: 6px 4px;
            background: transparent;
            border: none;
            border-radius: var(--radius-sm);
            color: var(--text2);
            font-size: 0.6rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            position: relative;
        }
        .nav-tabs button .nav-icon {
            font-size: 1.4rem;
            line-height: 1;
        }
        .nav-tabs button .nav-label {
            font-size: 0.55rem;
            letter-spacing: 0.3px;
        }
        .nav-tabs button.active {
            color: #fff;
        }
        .nav-tabs button.active::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: var(--radius-sm);
            opacity: 0.15;
        }
        .nav-tabs button:active {
            transform: scale(0.92);
        }

        /* ========== PAGES ========== */
        .page {
            display: none;
            animation: fadeUp 0.4s ease;
            padding-bottom: 16px;
        }
        .page.active {
            display: block;
        }

        /* ========== HOME ========== */
        .welcome-card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 20px 16px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }
        .welcome-card h2 {
            font-size: 1.2rem;
            margin-bottom: 4px;
            position: relative;
        }
        .welcome-card p {
            color: var(--text2);
            font-size: 0.85rem;
            line-height: 1.5;
            position: relative;
        }
        .welcome-card .quote {
            margin-top: 12px;
            padding: 12px 14px;
            background: var(--surface2);
            border-radius: var(--radius-sm);
            font-style: italic;
            font-size: 0.85rem;
            color: var(--text2);
            border-left: 3px solid var(--primary);
            position: relative;
        }

        .home-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        .home-card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 10px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        .home-card:active {
            transform: scale(0.95);
        }
        .home-card .icon {
            font-size: 1.6rem;
            margin-bottom: 4px;
        }
        .home-card .num {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .home-card .label {
            color: var(--text2);
            font-size: 0.6rem;
            margin-top: 2px;
            font-weight: 500;
        }
        .home-card .small-num {
            font-size: 1rem;
        }

        /* ========== PLANNER ========== */
        .date-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: var(--radius);
            margin-bottom: 14px;
            box-shadow: var(--shadow);
        }
        .date-nav button {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 1rem;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .date-nav button:active {
            transform: scale(0.9);
            background: var(--primary);
        }
        .date-nav h2 {
            font-size: 0.95rem;
            font-weight: 600;
            text-align: center;
        }

        .search-bar {
            margin-bottom: 12px;
        }
        .search-bar input {
            width: 100%;
            padding: 10px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 0.85rem;
            outline: none;
            transition: var(--transition);
        }
        .search-bar input:focus {
            border-color: var(--primary);
        }
        .search-bar input::placeholder {
            color: var(--text3);
        }

        .add-task {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 14px;
        }
        .add-task .row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .add-task .row input,
        .add-task .row select {
            flex: 1;
            min-width: 80px;
            padding: 10px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 0.82rem;
            outline: none;
            transition: var(--transition);
        }
        .add-task .row input:focus,
        .add-task .row select:focus {
            border-color: var(--primary);
        }
        .add-task .row input::placeholder {
            color: var(--text3);
        }
        .add-task .row input[type="time"] {
            max-width: 100px;
        }
        .add-task .add-btn {
            padding: 11px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.25);
        }
        .add-task .add-btn:active {
            transform: scale(0.97);
        }

        .tasks-section {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            box-shadow: var(--shadow);
            margin-bottom: 14px;
        }
        .tasks-section .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.85rem;
            color: var(--text2);
        }
        .tasks-section .section-header h3 {
            font-size: 0.95rem;
            font-weight: 600;
        }
        .tasks-section .section-header span {
            font-size: 0.75rem;
            color: var(--text3);
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: var(--surface2);
            border-radius: var(--radius-sm);
            margin-bottom: 6px;
            transition: var(--transition);
            border-left: 3px solid var(--primary);
            animation: slideIn 0.35s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-15px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .task-item:active {
            transform: scale(0.98);
        }
        .task-item.done {
            border-left-color: #4ade80;
            opacity: 0.55;
        }
        .task-item.done .task-text {
            text-decoration: line-through;
            color: var(--text3);
        }
        .task-item.failed {
            border-left-color: #f87171;
            opacity: 0.45;
        }
        .task-item.failed .task-text {
            text-decoration: line-through;
            color: var(--text3);
        }

        .task-item .task-time {
            background: var(--surface3);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 700;
            white-space: nowrap;
            min-width: 45px;
            text-align: center;
            color: var(--text2);
        }
        .task-item .task-text {
            flex: 1;
            font-weight: 500;
            font-size: 0.82rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .task-item .task-badges {
            display: flex;
            gap: 4px;
            flex-wrap: nowrap;
        }
        .task-item .task-badge {
            padding: 1px 8px;
            border-radius: 20px;
            font-size: 0.55rem;
            font-weight: 700;
            white-space: nowrap;
            border: 1px solid var(--border);
        }
        .task-item .task-badge.points {
            color: var(--primary-light);
            background: var(--surface);
        }
        .task-item .task-badge.category {
            color: var(--secondary);
            background: var(--surface);
        }
        .task-item .task-badge.alarm {
            color: var(--accent);
            background: var(--surface);
            font-size: 0.7rem;
            padding: 1px 4px;
            animation: alarmPulse 2s ease-in-out infinite;
        }
        @keyframes alarmPulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        .task-actions {
            display: flex;
            gap: 2px;
        }
        .task-actions button {
            background: none;
            border: none;
            color: var(--text3);
            font-size: 0.85rem;
            cursor: pointer;
            padding: 2px 5px;
            border-radius: 6px;
            transition: var(--transition);
        }
        .task-actions button:active {
            transform: scale(0.85);
        }
        .task-actions .btn-done {
            color: #4ade80;
        }
        .task-actions .btn-fail {
            color: #f87171;
        }
        .task-actions .btn-edit {
            color: var(--primary-light);
        }
        .task-actions .btn-alarm {
            color: var(--secondary);
        }
        .task-actions .btn-delete {
            color: var(--text3);
        }

        .empty-state {
            padding: 24px 16px;
            text-align: center;
            color: var(--text3);
            font-size: 0.85rem;
        }
        .empty-state .icon {
            font-size: 2.4rem;
            display: block;
            margin-bottom: 8px;
        }

        /* ========== REPORT ========== */
        .report-section {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 18px;
            box-shadow: var(--shadow);
            margin-bottom: 14px;
        }
        .report-section h2 {
            font-size: 1.1rem;
            margin-bottom: 12px;
        }

        .report-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 14px;
        }
        .report-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 12px 8px;
            border-radius: var(--radius-sm);
            text-align: center;
        }
        .report-card .num {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .report-card .label {
            font-size: 0.6rem;
            color: var(--text2);
            margin-top: 2px;
        }

        .chart-container {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px;
            margin-top: 12px;
        }
        .chart-container h4 {
            font-size: 0.8rem;
            color: var(--text2);
            margin-bottom: 10px;
        }
        .chart-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        .chart-bar .day-label {
            min-width: 32px;
            font-size: 0.65rem;
            color: var(--text2);
            font-weight: 500;
        }
        .chart-bar .bar-track {
            flex: 1;
            height: 18px;
            background: var(--surface);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .chart-bar .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            transition: width 0.8s ease;
        }
        .chart-bar .bar-label {
            min-width: 32px;
            font-size: 0.6rem;
            color: var(--text2);
            text-align: right;
        }

        .experience-box {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px;
            margin-top: 12px;
        }
        .experience-box h4 {
            font-size: 0.8rem;
            color: var(--text2);
            margin-bottom: 8px;
        }
        .experience-box textarea {
            width: 100%;
            padding: 10px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 0.82rem;
            resize: vertical;
            min-height: 60px;
            outline: none;
            font-family: inherit;
        }
        .experience-box textarea:focus {
            border-color: var(--primary);
        }
        .experience-box .save-btn {
            margin-top: 8px;
            padding: 8px 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .experience-box .save-btn:active {
            transform: scale(0.95);
        }
        .saved-experience {
            margin-top: 8px;
            padding: 8px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            display: none;
            font-size: 0.82rem;
            color: var(--text2);
        }

        /* ========== LEADERBOARD ========== */
        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: var(--surface2);
            border-radius: var(--radius-sm);
            margin-bottom: 4px;
            transition: var(--transition);
        }
        .leaderboard-item .rank {
            font-weight: 800;
            color: var(--primary-light);
            min-width: 28px;
            font-size: 0.85rem;
        }
        .leaderboard-item .name {
            flex: 1;
            font-weight: 500;
            font-size: 0.82rem;
        }
        .leaderboard-item .points {
            font-weight: 700;
            color: var(--secondary);
            font-size: 0.8rem;
        }
        .leaderboard-item .streak {
            font-size: 0.65rem;
            color: var(--accent);
            margin-left: 4px;
        }
        .leaderboard-item.highlight {
            border: 1px solid var(--primary);
            background: var(--surface3);
        }

        /* ========== ACTION BAR ========== */
        .action-bar {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .action-bar button {
            padding: 8px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text2);
            font-weight: 600;
            font-size: 0.7rem;
            cursor: pointer;
            transition: var(--transition);
            flex: 1;
            min-width: 60px;
            text-align: center;
        }
        .action-bar button:active {
            transform: scale(0.95);
        }

        /* ========== TOAST ========== */
        .toast {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%) translateY(-120%);
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            font-weight: 500;
            font-size: 0.8rem;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 999;
            max-width: 90%;
            text-align: center;
            border-left: 4px solid var(--primary);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ========== MODAL ========== */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 20px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            animation: modalSlide 0.3s ease;
        }
        @keyframes modalSlide {
            from {
                opacity: 0;
                transform: scale(0.92) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .modal-content h2 {
            font-size: 1.1rem;
            margin-bottom: 16px;
        }
        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 8px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 0.85rem;
            outline: none;
            transition: var(--transition);
        }
        .modal-content input:focus,
        .modal-content select:focus {
            border-color: var(--primary);
        }
        .modal-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .modal-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .modal-actions .btn-save {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
        }
        .modal-actions .btn-cancel {
            background: var(--surface3);
            color: var(--text2);
        }
        .modal-actions button:active {
            transform: scale(0.95);
        }

        /* ========== HIDDEN ========== */
        #fileInput {
            display: none;
        }
